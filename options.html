<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>LinkPortal – Einstellungen</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
<div class="container">

  <header class="header">
    <div class="header-brand">
      <img id="portal-logo-opts" class="portal-logo-header" src="icons/icon48.png" alt="" style="display:none">
      <svg id="default-icon-opts" class="brand-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
        <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
      </svg>
      <div>
        <div class="brand-name">LinkPortal</div>
        <div class="brand-sub" id="opt-subtitle">Chrome Extension · Einstellungen</div>
      </div>
    </div>
  </header>

  <main class="main">

    <!-- Verbindung -->
    <section class="card">
      <h2 class="card-title" id="lbl-connection">🔌 Verbindung</h2>

      <div class="field">
        <label class="label" id="lbl-url" for="base-url">LinkPortal URL</label>
        <div class="input-wrap">
          <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/>
            <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
          </svg>
          <input type="url" id="base-url" class="input" placeholder="https://portal.deinefirma.de" spellcheck="false">
        </div>
        <span class="field-hint" id="lbl-url-hint"></span>
      </div>

      <div class="field-row">
        <div class="field field-grow">
          <label class="label" id="lbl-token" for="api-token">API-Token</label>
          <div class="input-wrap">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <!-- token field: masked after save -->
            <input type="password" id="api-token" class="input" spellcheck="false">
            <button id="btn-edit-token" class="input-action input-action-text" style="display:none" title="Bearbeiten">✏️</button>
            <button id="btn-toggle-token" class="input-action" title="Anzeigen/Verbergen">
              <svg id="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
          <span class="field-hint" id="lbl-token-hint"></span>
        </div>

        <div class="field field-narrow">
          <label class="label" id="lbl-user" for="username">Benutzername</label>
          <div class="input-wrap">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
            <input type="text" id="username" class="input" placeholder="z.B. max.muster" spellcheck="false">
          </div>
          <span class="field-hint" id="lbl-user-hint"></span>
        </div>
      </div>
    </section>

    <!-- Verbindungstest -->
    <section class="card">
      <h2 class="card-title" id="lbl-test-title">🧪 Verbindung testen</h2>
      <div id="test-result" class="test-result" style="display:none"></div>
      <button id="btn-test" class="btn btn-secondary">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
        </svg>
        <span id="lbl-test-btn">Verbindung testen</span>
      </button>
    </section>

    <!-- Cache & Sync -->
    <section class="card">
      <h2 class="card-title" id="lbl-sync-title">📦 Cache & Synchronisation</h2>
      <div class="sync-info-row">
        <div class="sync-info-item">
          <span class="sync-label" id="lbl-last-sync">Letzter Sync</span>
          <span id="last-sync-time" class="sync-value">—</span>
        </div>
        <div class="sync-info-item">
          <span class="sync-label" id="lbl-auto-sync">Auto-Sync</span>
          <span class="sync-value" id="lbl-auto-val">alle 30 Min</span>
        </div>
        <div class="sync-info-item">
          <span class="sync-label" id="lbl-cached">Cached Links</span>
          <span id="cache-link-count" class="sync-value">—</span>
        </div>
      </div>
      <div id="sync-result" class="test-result" style="display:none"></div>
      <div class="btn-row">
        <button id="btn-sync-now" class="btn btn-primary">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="23 4 23 10 17 10"/>
            <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
          </svg>
          <span id="lbl-sync-now">Jetzt synchronisieren</span>
        </button>
        <button id="btn-clear-cache" class="btn btn-ghost">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="3 6 5 6 21 6"/>
            <path d="M19 6l-1 14H6L5 6"/>
            <path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/>
          </svg>
          <span id="lbl-clear-cache">Cache leeren</span>
        </button>
      </div>
    </section>

    <!-- Sprache -->
    <section class="card">
      <h2 class="card-title" id="lbl-lang-title">🌐 Sprache</h2>
      <div class="field">
        <label class="label" id="lbl-lang-label" for="lang-select-opts">Anzeigesprache</label>
        <div class="input-wrap input-wrap-select">
          <select id="lang-select-opts" class="input input-select">
            <option value="de">🇩🇪 Deutsch</option>
            <option value="en">🇬🇧 English</option>
            <option value="es">🇪🇸 Español</option>
          </select>
        </div>
        <span class="field-hint" id="lbl-lang-hint">Sprache wird mit dem Portal synchronisiert</span>
      </div>
    </section>

    <!-- Info -->
    <section class="card">
      <h2 class="card-title" id="lbl-info-title">ℹ️ Info</h2>
      <p class="about-text" id="lbl-info-text"></p>
      <div class="about-meta">
        <span class="badge">Version 1.3.0</span>
        <span class="badge">Basic Auth</span>
        <span class="badge">Manifest V3</span>
      </div>
    </section>

  </main>

  <!-- Footer: Zurücksetzen links · Status+Speichern rechts -->
  <footer class="footer">
    <button id="btn-reset" class="btn btn-ghost">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="1 4 1 10 7 10"/>
        <path d="M3.51 15a9 9 0 1 0 .49-3.51"/>
      </svg>
      <span id="lbl-reset">Zurücksetzen</span>
    </button>
    <div class="footer-right">
      <div id="save-status" class="save-status"></div>
      <button id="btn-save" class="btn btn-primary" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
          <polyline points="17 21 17 13 7 13 7 21"/>
          <polyline points="7 3 7 8 15 8"/>
        </svg>
        <span id="lbl-save">Speichern</span>
      </button>
    </div>
  </footer>

</div>
<script src="i18n.js"></script>
<script src="options.js"></script>
</body>
</html>
